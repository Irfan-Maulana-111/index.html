<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selamat Datang di Website Sekolah</title>
    <style>
        /* Mengatur agar body memenuhi tinggi layar */
        body, html {
            height: 100%;
            margin: 0;
            display: flex;
            justify-content: center; /* Posisi tengah horizontal */
            align-items: center;     /* Posisi tengah vertikal */
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
        }

        /* Styling container teks */
        .welcome-container {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }

        p {
            color: #666;
            margin-bottom: 20px;
        }

        .btn {
            display: inline-block;
            padding: 10px 20px;
            background-color: #007bff; /* Warna biru */
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
        }

        .btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="welcome-container">
        <h1>Selamat Datang di Website Sekolah</h1>
        <p>Informasi resmi seputar kegiatan akademik dan berita sekolah.</p>
        <a href="#" class="btn">Lihat Informasi</a>
    </div>

</body>
</html>
